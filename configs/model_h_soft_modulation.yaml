experiment_name: "model_h_soft_modulation"

data:
  json_path: "/workspace/mimic_master_official_split.jsonl"
  image_root: "/datasets/MIMIC-CXR/files"
  batch_size: 24
  num_workers: 4
  image_size: 224
  text_sections: "findings_impression"

model:
  vision_backbone: "hf-hub:microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
  text_backbone: "hf-hub:microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"

  # Model H: soft intra-ViT FILIP sigmoid gating.
  # All 196 patches continue through upper blocks — no hard sequence reduction.
  # Patches are multiplicatively scaled by sigmoid(T × filip_score_i):
  #   text-relevant patches (high FILIP score) → gate ≈ 1 (amplified)
  #   irrelevant patches   (low FILIP score)  → gate ≈ 0 (suppressed)
  # Fully differentiable: clean sigmoid gradients, no STE approximation.
  use_soft_modulation: true

  # Same drop point as Model F for fair comparison.
  drop_layer: 6

  # Temperature for sigmoid gating: T=5 → sigmoid(±1)=0.993/0.007 (nearly binary).
  # Lower T (e.g. 2) → softer gates, higher T → harder gates closer to TopK.
  drop_temperature: 5.0

  # Target kept ratio for SparsityLoss: (sigmoid(T*scores).mean() - k_ratio)^2.
  # Set to 0.5 → same net sparsity as Model F (keep ~98 of 196 patches active).
  k_ratio: 0.5

  use_filip_final: true
  mid_fusion_loss_weights: [0.3, 0.3]
  mid_fusion_warmup_steps: 500

  # Sparsity weight drives mean gate activation toward target_ratio.
  # Unlike Model F (TopK guarantees exact sparsity), we need this loss.
  sparsity_weight: 2.0
  sparsity_warmup_steps: 500

  contrastive_mask_weight: 1.0
  contrastive_full_weight: 0.5

training:
  staged_training: true
  warmup_epochs: 1
  warmup_lr: 1.0e-4

  early_stopping_metric: "combined"

  combined_weights:
    recall: 0.7
    auc: 0.3

  eval_auc_every: 1

  epochs: 40
  lr: 1.0e-5
  weight_decay: 0.02
  warmup_steps: 1000
  early_stopping_patience: 6
  print_freq: 50
  device: "cuda"
  use_amp: true
  gradient_accumulation_steps: 8
  freeze_backbone: false
  llrd_factor: 0.85

wandb:
  enable: true
  project: "Thesis-PatchIB"
  run_name: "model-h-soft-modulation"
