experiment_name: "model_c_filip"

data:
  json_path: "/workspace/mimic_master_official_split.jsonl"
  image_root: "/datasets/MIMIC-CXR/files"
  batch_size: 48
  num_workers: 4
  image_size: 224
  text_sections: "findings_impression"

model:
  vision_backbone: "hf-hub:microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
  text_backbone: "hf-hub:microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"

  # C|1 bottleneck: STE binary masking, keep 50% of patches.
  # The masked-patch mean-pool IS the primary image embedding (information bottleneck).
  # This is what drives C|1's NMI advantage over F/G/H (which use full CLS at eval).
  use_masking: true
  mask_ratio: 0.5

  # Sparsity loss: light regularization to prevent mask collapse (all-0 or all-1).
  # Much lower than C|1's 10.0 because FILIP loss already applies selection pressure
  # via the per-patch cosine scores — we don't want sparsity to dominate.
  use_sparsity_loss: true
  sparsity_weight: 2.0
  sparsity_warmup_steps: 500

  # No consistency loss: we deliberately want the masked embedding to diverge from
  # the full embedding toward the disease-specific patches selected by FILIP.
  # Consistency would suppress that divergence and hurt NMI.
  consistency_weight: 0.0

  # Contrastive losses: same dual-path as C|1.
  #   contrastive_mask_weight: primary NCE on the masked (FILIP-selected) embedding
  #   contrastive_full_weight: auxiliary NCE on the full embedding (training stability)
  contrastive_mask_weight: 1.0
  contrastive_full_weight: 0.5

  # KEY CHANGE over C|1: replace cosine MSE local alignment with FILIP scoring.
  # FILIP computes per-patch max cosine similarity to text tokens — text-conditioned,
  # query-specific, and directly compatible with the STE mask scoring.
  # The patch_proj / token_proj projectors (768→512) are shared with the mask scorer.
  use_local_alignment: true
  local_alignment_loss_type: "filip"

  # Same strong alignment weight as C|1 (weight=500).
  # This is what drives C|1's NMI advantage: the model is forced to compress all
  # information into patches that maximally align with text token semantics.
  # The FILIP version adds query-specificity on top of this pressure.
  local_alignment_weight: 500
  local_alignment_warmup_steps: 500

training:
  staged_training: true    # 1 frozen epoch (lr=warmup_lr) then full fine-tune
  warmup_epochs: 1
  warmup_lr: 1.0e-4

  early_stopping_metric: "combined"
  combined_weights:
    recall: 0.7
    auc: 0.3

  eval_auc_every: 1

  epochs: 40
  lr: 1.0e-5
  weight_decay: 0.02
  warmup_steps: 1000
  early_stopping_patience: 6
  print_freq: 50
  device: "cuda"
  use_amp: true
  gradient_accumulation_steps: 4
  freeze_backbone: false
  llrd_factor: 0.85

wandb:
  enable: true
  project: "Thesis-PatchIB"
  run_name: "model-c-filip"
